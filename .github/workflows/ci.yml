name: CI

on:
  push:
    branches: [main, develop, "claude/*"]
  pull_request:
    branches: [main]

jobs:
  # ── C++ build + tests ────────────────────────────────────────────────────
  cpp:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
        include:
          - os: ubuntu-latest
            cmake_extra: ""
          - os: macos-latest
            cmake_extra: ""
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies (Ubuntu)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y cmake g++-13
        env:
          CC: gcc-13
          CXX: g++-13

      - name: Configure
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release -DSHANNON_BUILD_TESTS=ON -DSHANNON_BUILD_PYTHON=OFF ${{ matrix.cmake_extra }}

      - name: Build
        run: cmake --build build -j$(nproc 2>/dev/null || sysctl -n hw.logicalcpu)

      - name: Test
        run: cd build && ctest --output-on-failure

  # ── Python build + tests ─────────────────────────────────────────────────
  python:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
        python-version: ["3.10", "3.11", "3.12"]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies (Ubuntu)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y cmake g++-13

      - name: Install Python package
        run: |
          pip install --upgrade pip
          pip install numpy pybind11 scikit-build-core pytest numba
          pip install -e ".[dev]"

      - name: Run Python tests
        run: pytest tests/test_detector.py -v

  # ── Python-only tests (no C++ build) ─────────────────────────────────────
  python-fallback:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install without C++ (pure Python fallback)
        run: |
          pip install numpy pytest
          pip install -e . --no-build-isolation 2>/dev/null || true
          # Fallback: install as pure Python
          cd python && pip install -e . 2>/dev/null || true
          PYTHONPATH=python pytest tests/test_detector.py -v
        env:
          PYTHONPATH: python
