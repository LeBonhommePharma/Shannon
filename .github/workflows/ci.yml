name: CI

on:
  push:
    branches: [main, develop, "claude/*"]
  pull_request:
    branches: [main]

jobs:
  # ── C++ build + tests ────────────────────────────────────────────────────
  cpp:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install dependencies (Ubuntu)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y cmake g++-13

      - name: Configure (Linux)
        if: runner.os == 'Linux'
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release -DSHANNON_BUILD_TESTS=ON -DSHANNON_BUILD_PYTHON=OFF -DCMAKE_CXX_COMPILER=g++-13

      - name: Configure (macOS)
        if: runner.os == 'macOS'
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release -DSHANNON_BUILD_TESTS=ON -DSHANNON_BUILD_PYTHON=OFF

      - name: Build
        run: cmake --build build -j$(nproc 2>/dev/null || sysctl -n hw.logicalcpu)

      - name: Test
        run: cd build && ctest --output-on-failure

  # ── Python build + tests ─────────────────────────────────────────────────
  python:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        python-version: ["3.10", "3.11", "3.12"]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install system dependencies (Ubuntu)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y cmake g++-13

      - name: Install Python package (Linux)
        if: runner.os == 'Linux'
        run: |
          pip install --upgrade pip
          pip install numpy pybind11 scikit-build-core pytest
          CMAKE_ARGS="-DCMAKE_CXX_COMPILER=g++-13" pip install -e .
        env:
          CXX: g++-13

      - name: Install Python package (macOS)
        if: runner.os == 'macOS'
        run: |
          pip install --upgrade pip
          pip install numpy pybind11 scikit-build-core pytest
          pip install -e .

      - name: Run Python tests
        run: pytest tests/test_detector.py -v

  # ── Python-only tests (no C++ build, pure fallback) ─────────────────────
  python-fallback:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install minimal dependencies
        run: pip install numpy pytest

      - name: Run tests with pure Python fallback
        run: pytest tests/test_detector.py -v
        env:
          PYTHONPATH: python
