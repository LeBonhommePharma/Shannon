name: PyPI Release

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      target:
        description: 'PyPI target (pypi or testpypi)'
        required: true
        default: 'testpypi'
        type: choice
        options:
          - pypi
          - testpypi

permissions:
  contents: read
  id-token: write   # Required for trusted publishing to PyPI

jobs:
  build-sdist:
    name: Build source distribution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tools
        run: python -m pip install --upgrade pip build twine

      - name: Build sdist
        run: python -m build --sdist --outdir dist

      - name: Twine check sdist
        run: python -m twine check dist/*.tar.gz

      - name: Verify sdist installs (pure-Python fallback OK)
        run: |
          set -euo pipefail
          python -m venv /tmp/shannon-sdist-venv
          # shellcheck disable=SC1091
          source /tmp/shannon-sdist-venv/bin/activate
          python -m pip install --upgrade pip
          # Force pure-Python path so CI does not depend on a C++ toolchain.
          SHANNON_SKIP_CORE=1 python -m pip install dist/*.tar.gz
          python -c "
import shannon
print('shannon', shannon.__version__, '_HAS_CORE=', shannon._HAS_CORE)
assert shannon.__version__, shannon.__version__
from shannon import ShannonCollapseDetector, shannon_entropy_from_probs
import numpy as np
h = shannon_entropy_from_probs(np.array([0.25, 0.25, 0.25, 0.25]))
assert abs(h - 2.0) < 1e-9, h
d = ShannonCollapseDetector()
print('smoke_ok', h)
"
          shannon-monitor --help
          # Version must match the static PEP 621 field in pyproject.toml
          python -c "
import re
from pathlib import Path
import shannon
text = Path('pyproject.toml').read_text(encoding='utf-8')
in_project = False
found = None
for line in text.splitlines():
    s = line.strip()
    if s.startswith('[') and s.endswith(']'):
        in_project = s == '[project]'
        continue
    if in_project and s.startswith('version') and '=' in s:
        found = s.split('=', 1)[1].strip().strip('\"\'')
        break
assert found == shannon.__version__, (found, shannon.__version__)
print('version_ok', shannon.__version__)
"

      - name: Upload sdist artifact
        uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: dist/*.tar.gz
          retention-days: 5

  # Guaranteed universal wheel so `pip install shannon-entropy` works without a
  # C++ compiler on any platform (accelerated wheels are additive later).
  build-pure-wheel:
    name: Build pure-Python wheel
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tools
        run: python -m pip install --upgrade pip build twine

      - name: Build pure-Python wheel
        env:
          SHANNON_SKIP_CORE: "1"
        run: python -m build --wheel --outdir dist

      - name: Twine check + smoke install
        run: |
          set -euo pipefail
          python -m twine check dist/*.whl
          python -m venv /tmp/shannon-pure-venv
          # shellcheck disable=SC1091
          source /tmp/shannon-pure-venv/bin/activate
          python -m pip install --upgrade pip
          python -m pip install dist/*.whl
          python -c "
import shannon
print('shannon', shannon.__version__, '_HAS_CORE=', shannon._HAS_CORE)
assert not shannon._HAS_CORE
from shannon import ShannonCollapseDetector
print('import_ok')
"
          shannon-monitor --help
          # Confirm wheel is pure py3-none-any (no platform tag).
          python - <<'PY'
          from pathlib import Path
          wheels = list(Path("dist").glob("*.whl"))
          assert wheels, "no wheel built"
          name = wheels[0].name
          assert name.endswith("py3-none-any.whl"), f"expected pure wheel, got {name}"
          print("pure wheel tag OK:", name)
          PY

      - name: Upload pure wheel artifact
        uses: actions/upload-artifact@v4
        with:
          name: wheels-pure
          path: dist/*.whl
          retention-days: 5

  publish:
    name: Publish to PyPI
    needs: [build-sdist, build-pure-wheel]
    runs-on: ubuntu-latest
    if: >-
      (github.event_name == 'release' && github.event.action == 'published') ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.target == 'pypi')
    environment:
      name: pypi
      url: https://pypi.org/project/shannon-entropy
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: List packages + trusted-publisher checklist
        run: |
          set -euo pipefail
          ls -la dist/
          python - <<'PY'
          from pathlib import Path
          files = sorted(Path("dist").glob("*"))
          assert files, "no artifacts to publish"
          sdists = list(Path("dist").glob("*.tar.gz"))
          wheels = list(Path("dist").glob("*.whl"))
          assert sdists, "missing sdist"
          assert wheels, "missing wheel"
          print("\n".join(str(p) for p in files))
          PY
          cat <<'EOF'
          === Trusted publisher must match (pypi.org → Publishing) ===
          Owner:             LeBonhommePharma
          Repository:        Shannon
          Workflow filename: pypi-release.yml
          Environment name:  pypi
          =======================================================================
          Alternative: set repo secret PYPI_API_TOKEN (pypi.org API token for
          project shannon-entropy). When that secret is non-empty, the publish
          action uses token auth; otherwise it uses OIDC trusted publishing.
          EOF

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          skip-existing: true
          password: ${{ secrets.PYPI_API_TOKEN }}

  publish-testpypi:
    name: Publish to TestPyPI (manual or pre-release)
    needs: [build-sdist, build-pure-wheel]
    runs-on: ubuntu-latest
    if: >-
      github.event_name == 'workflow_dispatch' &&
      github.event.inputs.target == 'testpypi'
    environment:
      name: testpypi
      url: https://test.pypi.org/project/shannon-entropy
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: List packages + trusted-publisher checklist
        run: |
          set -euo pipefail
          ls -la dist/
          python - <<'PY'
          from pathlib import Path
          files = sorted(Path("dist").glob("*"))
          assert files, "no artifacts to publish"
          sdists = list(Path("dist").glob("*.tar.gz"))
          wheels = list(Path("dist").glob("*.whl"))
          assert sdists, "missing sdist"
          assert wheels, "missing wheel"
          pure = [w for w in wheels if w.name.endswith("py3-none-any.whl")]
          assert pure, f"missing pure py3-none-any wheel among {[w.name for w in wheels]}"
          print("\n".join(str(p) for p in files))
          PY
          cat <<'EOF'
          === Trusted publisher must match (test.pypi.org → Publishing) ===
          If the project does not exist yet, create a *pending* publisher:
            https://test.pypi.org/manage/account/publishing/
          Values (must match OIDC claims exactly):
            PyPI Project Name:   shannon-entropy   (pending OK)
            Owner:               LeBonhommePharma
            Repository:          Shannon
            Workflow filename:   pypi-release.yml
            Environment name:    testpypi
          ==================================================================
          Alternative: set repo secret TEST_PYPI_API_TOKEN (TestPyPI API token).
          EOF

      - name: Publish to TestPyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
          skip-existing: true
          password: ${{ secrets.TEST_PYPI_API_TOKEN }}
