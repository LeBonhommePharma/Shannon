# XcodeGen spec for the Shannon iPhone app, its widget, and the paired
# Apple Watch app.
#
#     cd iOS && xcodegen generate && open Shannon.xcodeproj
#
# Regenerate after adding source files; the .xcodeproj is not checked in.
#
# CloudKit, App Groups and the shared Keychain group all need a real Apple
# Developer account — see docs/MULTI_DEVICE.md for the exact steps.
#
# Deployment targets are iOS 17 / watchOS 10. That is a hard floor, not a
# preference: the Observation framework, `scrollTargetBehavior`, Double Tap
# (`handGestureShortcut`) and Smart Stack all require it.

name: Shannon
options:
  bundleIdPrefix: com.lebonhommepharma.shannon
  deploymentTarget:
    iOS: "17.0"
    watchOS: "10.0"
  createIntermediateGroups: true

packages:
  ShannonCore:
    path: ../Packages/ShannonCore
  ShannonTheme:
    path: ../Packages/ShannonTheme

settings:
  base:
    SWIFT_VERSION: "5.0"
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "1"
    CODE_SIGN_STYLE: Automatic
    # Blank until LP signs in with his Apple Developer account in Xcode;
    # everything below builds unsigned for the Simulator without it.
    DEVELOPMENT_TEAM: ""
    GENERATE_INFOPLIST_FILE: YES
    # Complete concurrency checking across every app target, matching the
    # setting ShannonCore builds with.
    SWIFT_STRICT_CONCURRENCY: complete

targets:
  # MARK: iPhone

  ShannonPhone:
    type: application
    platform: iOS
    sources:
      - path: Sources/ShannonPhone
      - path: Sources/Shared
      - path: Resources/PrivacyInfo.xcprivacy
        buildPhase: resources
    dependencies:
      - package: ShannonCore
      - package: ShannonTheme
      - target: ShannonWidget
        embed: true
      - target: ShannonWatch
        embed: true
    info:
      path: Resources/GeneratedInfo.plist
      properties:
        CFBundleDisplayName: Shannon
        UILaunchScreen: {}
        UIBackgroundModes:
          # Silent CloudKit pushes wake the app to refresh state.
          - remote-notification
        # App Transport Security: HTTPS only, no arbitrary loads, no
        # per-domain exceptions. Shannon talks to CloudKit and nothing else,
        # so there is nothing legitimate to exempt.
        NSAppTransportSecurity:
          NSAllowsArbitraryLoads: false
          NSAllowsArbitraryLoadsInWebContent: false
          NSAllowsLocalNetworking: false
        NSMotionUsageDescription: Shannon reads AirPods head motion so you can nod to confirm or shake to deny an agent's question. Motion is only read while a question is waiting.
        NSMicrophoneUsageDescription: Shannon uses the microphone for voice commands such as "confirm" or "status".
        NSSpeechRecognitionUsageDescription: Shannon transcribes your voice commands on this device. Speech is never sent to a server.
        NSBluetoothAlwaysUsageDescription: Shannon reads the battery level of connected AirPods.
    entitlements:
      path: Resources/ShannonPhone.entitlements
      properties:
        com.apple.developer.icloud-container-identifiers:
          - iCloud.com.lebonhommepharma.shannon
        com.apple.developer.icloud-services:
          - CloudKit
        com.apple.security.application-groups:
          - group.com.lebonhommepharma.shannon
        # Shared with the Mac app, so a token provisioned there is readable
        # here without a second sign-in.
        keychain-access-groups:
          - $(AppIdentifierPrefix)com.lebonhommepharma.shannon
        aps-environment: development
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.lebonhommepharma.shannon.phone
        TARGETED_DEVICE_FAMILY: "1,2"

  ShannonWidget:
    type: app-extension
    platform: iOS
    sources:
      - path: Sources/ShannonWidget
      - path: Sources/Shared
      - path: Resources/PrivacyInfo.xcprivacy
        buildPhase: resources
    dependencies:
      - package: ShannonCore
      - package: ShannonTheme
    info:
      path: Resources/GeneratedWidgetInfo.plist
      properties:
        CFBundleDisplayName: Shannon
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
        NSAppTransportSecurity:
          NSAllowsArbitraryLoads: false
    entitlements:
      path: Resources/ShannonWidget.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.lebonhommepharma.shannon
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.lebonhommepharma.shannon.phone.widget

  # MARK: Apple Watch
  #
  # Sources live in ../watchOS so the watch app is browsable on its own, but
  # the targets belong to this project — a watchOS app must be embedded in its
  # companion iOS app to install.

  ShannonWatch:
    type: application
    platform: watchOS
    sources:
      - path: ../watchOS/Sources/ShannonWatch
      - path: ../watchOS/Sources/Shared          # shared between ShannonWatch and ShannonComplication
      - path: ../watchOS/Resources/PrivacyInfo.xcprivacy
        buildPhase: resources
    dependencies:
      - package: ShannonCore
      - package: ShannonTheme
      - target: ShannonComplication
        embed: true
    info:
      path: ../watchOS/Resources/GeneratedInfo.plist
      properties:
        CFBundleDisplayName: Shannon
        WKApplication: true
        WKCompanionAppBundleIdentifier: com.lebonhommepharma.shannon.phone
        WKRunsIndependentlyOfCompanionApp: false
        # Pre-warms state on wrist raise so the face is never a spinner.
        WKBackgroundModes:
          - app-refresh
        NSAppTransportSecurity:
          NSAllowsArbitraryLoads: false
        NSMotionUsageDescription: Shannon reads wrist motion to wake the Shannon face with a flick of the wrist.
        NSHealthShareUsageDescription: Shannon can tint the Shannon face when your heart rate rises during a docking run. This is off by default, opt-in, and heart-rate data never leaves your watch.
    entitlements:
      path: ../watchOS/Resources/ShannonWatch.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.lebonhommepharma.shannon
        keychain-access-groups:
          - $(AppIdentifierPrefix)com.lebonhommepharma.shannon
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.lebonhommepharma.shannon.phone.watchkitapp
        TARGETED_DEVICE_FAMILY: "4"

  ShannonComplication:
    type: app-extension
    platform: watchOS
    sources:
      - path: ../watchOS/Sources/ShannonWatchComplication
      - path: ../watchOS/Sources/Shared          # shared between ShannonWatch and ShannonComplication
      - path: ../watchOS/Resources/PrivacyInfo.xcprivacy
        buildPhase: resources
    dependencies:
      - package: ShannonCore
      - package: ShannonTheme
    info:
      path: ../watchOS/Resources/GeneratedComplicationInfo.plist
      properties:
        CFBundleDisplayName: Shannon
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
        NSAppTransportSecurity:
          NSAllowsArbitraryLoads: false
    entitlements:
      path: ../watchOS/Resources/ShannonComplication.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.lebonhommepharma.shannon
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.lebonhommepharma.shannon.phone.watchkitapp.complication

schemes:
  ShannonPhone:
    build:
      targets:
        ShannonPhone: all
    run:
      config: Debug
  ShannonWatch:
    build:
      targets:
        ShannonWatch: all
    run:
      config: Debug
